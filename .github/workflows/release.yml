name: Release
on:
  push:
    branches:
      - main
concurrency: ${{ github.workflow }}-${{ github.ref }}
permissions:
  contents: write
  pull-requests: write
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      deployed: ${{ steps.deploy_book.outputs.deployed }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v3
        with:
          node-version: 24.x
      - run: npm install
      - run: npm run build
      - run: npm run test
      # Changesets action: opens a version-bump PR if changesets are pending,
      # otherwise does nothing (no npm publish for this fork)
      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version
          commit: 🚀 Release
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Git to Push Built Artifacts
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          git config --global url."https://${{ secrets.NYST_DEPLOY_USER }}:${{ secrets.NYST_DEPLOY_TOKEN}}@github.com".insteadOf "https://github.com"
          git config --global user.email "bot@github.com"
          git config --global user.name "NyST Theme Bot"
      - name: Deploy Book
        id: deploy_book
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          make deploy-book
          echo "deployed=true" >> "$GITHUB_OUTPUT"
      - name: Deploy Article
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: make deploy-article

  # Grab the tag from package.json so we know how to tag the github release
  get-tag:
    name: Get Tag Name
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.get_tag.outputs.tag_name }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Determine tag from myst-to-react package.json
        id: get_tag
        run: |
          VERSION=$(jq -r '.version' packages/myst-to-react/package.json)
          if [ -z "$VERSION" ]; then
            echo "Unable to read version from packages/myst-to-react/package.json" >&2
            exit 1
          fi
          TAG="nyst-theme@$VERSION"
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

  # Trigger a github release workflow only if we've deployed
  release-github:
    name: Publish GitHub Release
    needs:
      - release
      - get-tag
    if: ${{ needs.release.outputs.deployed == 'true' }}
    uses: ./.github/workflows/publish-github-release.yml
    with:
      tag_name: ${{ needs.get-tag.outputs.tag_name }}
    secrets: inherit
